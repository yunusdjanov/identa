openapi: 3.1.0
info:
  title: Identa API
  version: 1.0.0
  description: |
    OpenAPI contract for Phase 2 backend integration.
    This contract is authoritative for frontend/backend alignment.
servers:
  - url: http://localhost:8000
    description: Local backend
tags:
  - name: Health
  - name: Auth
  - name: Patients
  - name: Appointments
  - name: Invoices
  - name: Payments
  - name: Settings
  - name: Admin
paths:
  /api/v1/health:
    get:
      tags: [Health]
      summary: API healthcheck
      operationId: getHealth
      responses:
        "200":
          description: Service healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  service:
                    type: string
                    example: backend
                  timestamp:
                    type: string
                    format: date-time
  /api/v1/auth/login:
    post:
      tags: [Auth]
      summary: Login and create session
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Logged in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "422":
          $ref: "#/components/responses/ValidationError"
  /api/v1/auth/logout:
    post:
      tags: [Auth]
      summary: Logout and revoke session
      operationId: logout
      security:
        - cookieAuth: []
      responses:
        "204":
          description: Logged out
        "401":
          $ref: "#/components/responses/UnauthorizedError"
  /api/v1/auth/forgot-password:
    post:
      tags: [Auth]
      summary: Send password reset link
      operationId: forgotPassword
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ForgotPasswordRequest"
      responses:
        "200":
          description: Reset link sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "422":
          $ref: "#/components/responses/ValidationError"
  /api/v1/auth/reset-password:
    post:
      tags: [Auth]
      summary: Reset password using token
      operationId: resetPassword
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResetPasswordRequest"
      responses:
        "200":
          description: Password reset successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "422":
          $ref: "#/components/responses/ValidationError"
  /api/v1/auth/me:
    get:
      tags: [Auth]
      summary: Current authenticated user
      operationId: getMe
      security:
        - cookieAuth: []
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
  /api/v1/patients:
    get:
      tags: [Patients]
      summary: List dentist-owned patients
      operationId: listPatients
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PerPage"
        - $ref: "#/components/parameters/Sort"
        - $ref: "#/components/parameters/SearchFilter"
        - $ref: "#/components/parameters/PatientCategoryFilter"
        - $ref: "#/components/parameters/PatientInactiveBeforeFilter"
      responses:
        "200":
          description: Paginated patients
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PatientCollectionResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
    post:
      tags: [Patients]
      summary: Create patient
      operationId: createPatient
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PatientUpsertRequest"
      responses:
        "201":
          description: Patient created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PatientResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "422":
          $ref: "#/components/responses/ValidationError"
  /api/v1/patients/{id}:
    get:
      tags: [Patients]
      summary: Get patient detail
      operationId: getPatient
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/ResourceId"
      responses:
        "200":
          description: Patient detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PatientResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/NotFoundError"
    put:
      tags: [Patients]
      summary: Update patient
      operationId: updatePatient
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/ResourceId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PatientUpsertRequest"
      responses:
        "200":
          description: Patient updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PatientResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "422":
          $ref: "#/components/responses/ValidationError"
        "404":
          $ref: "#/components/responses/NotFoundError"
    delete:
      tags: [Patients]
      summary: Delete patient
      operationId: deletePatient
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/ResourceId"
      responses:
        "204":
          description: Patient deleted
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/NotFoundError"
  /api/v1/patients/{id}/odontogram:
    get:
      tags: [Patients]
      summary: List odontogram entries for patient
      operationId: listPatientOdontogram
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/ResourceId"
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PerPage"
        - $ref: "#/components/parameters/Sort"
        - $ref: "#/components/parameters/ToothNumberFilter"
      responses:
        "200":
          description: Paginated odontogram entries
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OdontogramEntryCollectionResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/NotFoundError"
    post:
      tags: [Patients]
      summary: Create odontogram entry for patient
      operationId: createPatientOdontogramEntry
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/ResourceId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OdontogramEntryCreateRequest"
      responses:
        "201":
          description: Odontogram entry created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OdontogramEntryResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "422":
          $ref: "#/components/responses/ValidationError"
  /api/v1/patients/{id}/odontogram/summary:
    get:
      tags: [Patients]
      summary: Get odontogram summary for patient detail preview
      operationId: getPatientOdontogramSummary
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/ResourceId"
        - $ref: "#/components/parameters/OdontogramSummaryLimitFilter"
      responses:
        "200":
          description: Odontogram summary payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OdontogramSummaryResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/NotFoundError"
  /api/v1/patients/{id}/treatments:
    get:
      tags: [Patients]
      summary: List treatments for patient
      operationId: listPatientTreatments
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/ResourceId"
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PerPage"
        - $ref: "#/components/parameters/Sort"
      responses:
        "200":
          description: Paginated treatments
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TreatmentCollectionResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/NotFoundError"
    post:
      tags: [Patients]
      summary: Create treatment for patient
      operationId: createPatientTreatment
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/ResourceId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TreatmentCreateRequest"
      responses:
        "201":
          description: Treatment created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TreatmentResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "422":
          $ref: "#/components/responses/ValidationError"
  /api/v1/appointments:
    get:
      tags: [Appointments]
      summary: List appointments
      operationId: listAppointments
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PerPage"
        - $ref: "#/components/parameters/Sort"
        - $ref: "#/components/parameters/PatientIdFilter"
        - $ref: "#/components/parameters/DateFromFilter"
        - $ref: "#/components/parameters/DateToFilter"
        - $ref: "#/components/parameters/StatusFilter"
      responses:
        "200":
          description: Paginated appointments
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppointmentCollectionResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
    post:
      tags: [Appointments]
      summary: Create appointment
      operationId: createAppointment
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AppointmentUpsertRequest"
      responses:
        "201":
          description: Appointment created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppointmentResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "422":
          $ref: "#/components/responses/ValidationError"
  /api/v1/appointments/{id}:
    get:
      tags: [Appointments]
      summary: Get appointment detail
      operationId: getAppointment
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/ResourceId"
      responses:
        "200":
          description: Appointment detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppointmentResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/NotFoundError"
    put:
      tags: [Appointments]
      summary: Update appointment
      operationId: updateAppointment
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/ResourceId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AppointmentUpsertRequest"
      responses:
        "200":
          description: Appointment updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppointmentResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "422":
          $ref: "#/components/responses/ValidationError"
    delete:
      tags: [Appointments]
      summary: Delete appointment
      operationId: deleteAppointment
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/ResourceId"
      responses:
        "204":
          description: Appointment deleted
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/NotFoundError"
  /api/v1/invoices:
    get:
      tags: [Invoices]
      summary: List invoices
      operationId: listInvoices
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PerPage"
        - $ref: "#/components/parameters/Sort"
        - $ref: "#/components/parameters/PatientIdFilter"
        - $ref: "#/components/parameters/StatusFilter"
        - $ref: "#/components/parameters/InvoiceStatusesFilter"
        - $ref: "#/components/parameters/SearchFilter"
      responses:
        "200":
          description: Paginated invoices
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InvoiceCollectionResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
    post:
      tags: [Invoices]
      summary: Create invoice
      operationId: createInvoice
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InvoiceUpsertRequest"
      responses:
        "201":
          description: Invoice created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InvoiceResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "422":
          $ref: "#/components/responses/ValidationError"
  /api/v1/invoices/{id}:
    get:
      tags: [Invoices]
      summary: Get invoice detail
      operationId: getInvoice
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/ResourceId"
      responses:
        "200":
          description: Invoice detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InvoiceResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/NotFoundError"
    put:
      tags: [Invoices]
      summary: Update invoice
      operationId: updateInvoice
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/ResourceId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InvoiceUpsertRequest"
      responses:
        "200":
          description: Invoice updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InvoiceResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "422":
          $ref: "#/components/responses/ValidationError"
    delete:
      tags: [Invoices]
      summary: Delete invoice
      operationId: deleteInvoice
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/ResourceId"
      responses:
        "204":
          description: Invoice deleted
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "422":
          $ref: "#/components/responses/ValidationError"
  /api/v1/payments:
    get:
      tags: [Payments]
      summary: List payments
      operationId: listPayments
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PerPage"
        - $ref: "#/components/parameters/Sort"
        - $ref: "#/components/parameters/PatientIdFilter"
        - $ref: "#/components/parameters/DateFromFilter"
        - $ref: "#/components/parameters/DateToFilter"
        - $ref: "#/components/parameters/InvoiceIdFilter"
      responses:
        "200":
          description: Paginated payments
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaymentCollectionResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
    post:
      tags: [Payments]
      summary: Record invoice payment
      operationId: createPayment
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PaymentCreateRequest"
      responses:
        "201":
          description: Payment recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaymentResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "422":
          $ref: "#/components/responses/ValidationError"
  /api/v1/settings/profile:
