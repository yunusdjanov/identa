      tags: [Settings]
      summary: Get dentist profile
      operationId: getProfile
      security:
        - cookieAuth: []
      responses:
        "200":
          description: Profile detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProfileResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
    put:
      tags: [Settings]
      summary: Update dentist profile
      operationId: updateProfile
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProfileUpdateRequest"
      responses:
        "200":
          description: Profile updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProfileResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "422":
          $ref: "#/components/responses/ValidationError"
  /api/v1/admin/dentists:
    get:
      tags: [Admin]
      summary: List dentist accounts (admin only)
      operationId: adminListDentists
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PerPage"
        - $ref: "#/components/parameters/SearchFilter"
        - $ref: "#/components/parameters/AccountStatusFilter"
      responses:
        "200":
          description: Dentist accounts
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminDentistCollectionResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
    post:
      tags: [Admin]
      summary: Create dentist account (admin only)
      operationId: adminCreateDentist
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminDentistCreateRequest"
      responses:
        "201":
          description: Dentist created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminDentistResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "422":
          $ref: "#/components/responses/ValidationError"
  /api/v1/admin/dentists/{id}/status:
    patch:
      tags: [Admin]
      summary: Update dentist account status (admin only)
      operationId: adminUpdateDentistStatus
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/ResourceId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminDentistStatusUpdateRequest"
      responses:
        "200":
          description: Dentist status updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminDentistResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "422":
          $ref: "#/components/responses/ValidationError"
  /api/v1/admin/dentists/{id}/reset-password:
    post:
      tags: [Admin]
      summary: Reset dentist password (admin only)
      operationId: adminResetDentistPassword
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/ResourceId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminDentistResetPasswordRequest"
      responses:
        "200":
          description: Dentist password reset
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminPasswordResetResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "422":
          $ref: "#/components/responses/ValidationError"
  /api/v1/admin/dentists/{id}:
    delete:
      tags: [Admin]
      summary: Delete dentist account (admin only)
      operationId: adminDeleteDentist
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/ResourceId"
      responses:
        "204":
          description: Dentist account marked as deleted
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/NotFoundError"
components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: laravel_session
  parameters:
    ResourceId:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    Page:
      name: page
      in: query
      schema:
        type: integer
        minimum: 1
        default: 1
    PerPage:
      name: per_page
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 15
    Sort:
      name: sort
      in: query
      description: Comma separated fields, prefix with '-' for desc (e.g. -created_at)
      schema:
        type: string
        example: -created_at
    SearchFilter:
      name: filter[search]
      in: query
      schema:
        type: string
    PatientIdFilter:
      name: filter[patient_id]
      in: query
      schema:
        type: string
        format: uuid
    PatientCategoryFilter:
      name: filter[category_id]
      in: query
      schema:
        type: string
        format: uuid
    PatientInactiveBeforeFilter:
      name: filter[inactive_before]
      in: query
      schema:
        type: string
        format: date
    DateFromFilter:
      name: filter[date_from]
      in: query
      schema:
        type: string
        format: date
    DateToFilter:
      name: filter[date_to]
      in: query
      schema:
        type: string
        format: date
    StatusFilter:
      name: filter[status]
      in: query
      schema:
        type: string
    InvoiceStatusesFilter:
      name: filter[statuses]
      in: query
      description: Comma-separated invoice statuses for multi-select filtering.
      schema:
        type: string
        example: unpaid,partially_paid
    AccountStatusFilter:
      name: filter[status]
      in: query
      schema:
        type: string
        enum: [active, blocked, deleted]
    InvoiceIdFilter:
      name: filter[invoice_id]
      in: query
      schema:
        type: string
        format: uuid
    ToothNumberFilter:
      name: filter[tooth_number]
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 32
    OdontogramSummaryLimitFilter:
      name: limit
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 10
        default: 5
  responses:
    ValidationError:
      description: Validation failed
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    UnauthorizedError:
      description: Authentication required
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    ForbiddenError:
      description: Access denied
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFoundError:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
  schemas:
